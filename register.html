    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Base branding styles matching the application ecosystem */
        
        body {
            background-color: #0d0d0d !important;
            color: #ffffff !important;
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
        }
        
        .text-gold {
            color: gold !important;
        }
        
        .btn-gold {
            background-color: gold;
            color: #000000;
            font-weight: bold;
            border-radius: 0;
            transition: all 0.3s ease;
        }
        
        .btn-gold:hover {
            background-color: #ffffff;
            color: #000000;
        }
        /* Premium Dark Registration Card Layout */
        
        .register-card {
            background-color: #1a1512;
            /* Deep dark brown tint variant */
            border: 1px solid #3d3025;
            max-width: 480px;
            width: 100%;
        }
        
        .card-title-serif {
            font-family: 'Georgia', serif;
            color: #ffffff;
        }
        
        .subtitle-text {
            font-family: 'Segoe UI', sans-serif;
            color: #c4b5a7;
            font-size: 0.95rem;
        }
        
        .form-label {
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: #c4b5a7;
            letter-spacing: 1px;
        }
        /* Form Inputs Focused Visual Highlights */
        
        .form-control {
            background-color: #2b221a !important;
            border: 1px solid #4e3e30 !important;
            color: #ffffff !important;
            border-radius: 4px;
            padding: 12px 15px;
        }
        
        .form-control::placeholder {
            color: #705f52;
        }
        
        .form-control:focus {
            outline: none !important;
            border-color: gold !important;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.15) !important;
        }
        /* Action Form Button */
        
        .btn-brand-action {
            background-color: #3d3025;
            color: #ffffff;
            font-family: Arial, sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid #544334;
            border-radius: 4px;
            padding: 14px;
            transition: all 0.2s ease;
        }
        
        .btn-brand-action:hover {
            background-color: #524132;
            color: #ffffff;
            border-color: #6e5945;
        }
        
        #message {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            min-height: 24px;
        }
    </style>
</head>

<body>

    <!-- CONTAINER STRUCTURAL WRAPPER -->
    <div class="container py-4" style="max-width: 1200px;">

        <!-- GLOBAL NAVIGATION NAVBAR COMPONENT -->
        <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary border-opacity-25 pb-4 mb-5">
            <div class="container-fluid p-0">
                <!-- Brand Identity Typography -->
                <a class="navbar-brand text-uppercase fw-light fs-4 text-start m-0 text-white" href="#" style="letter-spacing: 2px;">
                    Dangerous
                    <span class="d-block text-gold fs-6" style="font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 1px;">DANCE FLOOR</span>
                </a>

                <!-- Responsive Collapse Toggle Button -->
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Navigation Route Links -->
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <div class="navbar-nav align-items-center gap-2 gap-lg-3 my-3 my-lg-0" style="font-family: Arial, sans-serif; font-size: 14px;">
                        <a class="nav-link text-white" href="index.html">Home</a>
                        <a class="nav-link text-white" href="about.html">About Us</a>
                        <a class="nav-link text-white" href="founder.html">Founder</a>
                        <a class="nav-link text-white" href="instructor.html">Instructor</a>
                        <a class="nav-link text-white" href="register.html">Student Registration</a>
                        <a class="nav-link text-white" href="login.html">Founder Login</a>
                        <a class="nav-link text-white" href="attendance.html">Attendance</a>
                        <a class="nav-link text-white" href="fees.html">Fees Payment</a>
                        <a class="nav-link text-white" href="map.html">Map Location</a>
                        <a href="contact.html" class="btn btn-gold px-4 py-2 ms-lg-2">Contact</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- CENTERED REGISTRATION INTERFACE PANEL -->
        <div class="d-flex justify-content-center align-items-center py-4">
            <div class="register-card p-4 p-sm-5 rounded-3 shadow-lg border-top border-4" style="border-top-color: gold !important;">

                <div class="text-center mb-4">
                    <h1 class="card-title-serif h3 mb-2 fw-normal">Student Registration</h1>
                    <p class="subtitle-text mb-0 fw-light">Join the academy and start your technical dance journey</p>
                </div>

                <!-- Input Registration Fields Form -->
                <div class="mb-3">
                    <label for="name" class="form-label text-uppercase mb-2">Student Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter student's full name">
                </div>

                <div class="mb-4">
                    <label for="parent" class="form-label text-uppercase mb-2">Parent Phone Number</label>
                    <input type="tel" id="parent" class="form-control" placeholder="Enter parent's mobile number">
                </div>

                <button onclick="registerStudent()" class="btn btn-brand-action w-100 text-uppercase fw-semibold mb-2">Register Student</button>

                <!-- Feedback Realtime Status Response Message -->
                <div id="message" class="text-center mt-3 mb-0"></div>
            </div>
        </div>

    </div>

    <!-- Firebase Registration Operations Logic script -->
    <script>
        function registerStudent() {
            const name = document.getElementById("name").value.trim();
            const parent = document.getElementById("parent").value.trim();
            const messageElement = document.getElementById("message");

            if (name === "" || parent === "") {
                messageElement.className = "text-warning fw-semibold";
                messageElement.innerHTML = "⚠ Please fill out all data entry fields.";
                return;
            }

            db.ref("students/" + name).once("value", function(snapshot) {
                if (snapshot.exists()) {
                    messageElement.className = "text-danger fw-semibold";
                    messageElement.innerHTML = "✕ This student is already registered.";
                } else {
                    db.ref("students/" + name).set({
                        studentName: name,
                        parentNumber: parent,
                        attendance: "Absent",
                        fees: "Pending"
                    }, function(error) {
                        if (error) {
                            messageElement.className = "text-danger fw-semibold";
                            messageElement.innerHTML = "✕ Save failed. Check network connection.";
                        } else {
                            messageElement.className = "text-success fw-semibold";
                            messageElement.innerHTML = "✓ Registration Successful!";
                            // Clean input state targets
                            document.getElementById("name").value = "";
                            document.getElementById("parent").value = "";
                        }
                    });
                }
            });
        }
    </script>

    <!-- Bootstrap 5 JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
