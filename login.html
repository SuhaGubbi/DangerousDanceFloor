<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Login - Dangerous Dance Floor</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Base branding styles matching the application ecosystem */
        
        body {
            background-color: #0d0d0d !important;
            color: #ffffff !important;
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
        }
        
        .text-gold {
            color: gold !important;
        }
        
        .btn-gold {
            background-color: gold;
            color: #000000;
            font-weight: bold;
            border-radius: 0;
            transition: all 0.3s ease;
        }
        
        .btn-gold:hover {
            background-color: #ffffff;
            color: #000000;
        }
        /* Premium Dark Theme Login Panel Layout Card */
        
        .login-card {
            background-color: #1a1512;
            /* Deep dark brown tint variant */
            border: 1px solid #3d3025;
            max-width: 420px;
            width: 100%;
        }
        
        .login-title {
            font-family: 'Georgia', serif;
            color: #ffffff;
        }
        
        .subtitle {
            font-family: 'Segoe UI', sans-serif;
            color: #c4b5a7;
            font-size: 0.95rem;
        }
        
        .form-label {
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: #c4b5a7;
            letter-spacing: 1px;
        }
        /* Bespoke Focus Visual Highlights */
        
        .form-control {
            background-color: #2b221a !important;
            border: 1px solid #4e3e30 !important;
            color: #ffffff !important;
            border-radius: 4px;
            padding: 12px 15px;
        }
        
        .form-control::placeholder {
            color: #705f52;
        }
        
        .form-control:focus {
            outline: none !important;
            border-color: gold !important;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.15) !important;
        }
        /* Brand Action Form Button styling */
        
        .btn-brand-brown {
            background-color: #3d3025;
            color: #ffffff;
            font-family: Arial, sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid #544334;
            border-radius: 4px;
            padding: 13px;
            transition: all 0.2s ease;
        }
        
        .btn-brand-brown:hover {
            background-color: #524132;
            color: #ffffff;
            border-color: #6e5945;
        }
        
        #message {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            min-height: 24px;
        }
    </style>
</head>

<body>

    <!-- CONTAINER STRUCTURAL WRAPPER -->
    <div class="container py-4" style="max-width: 1200px;">

        <!-- GLOBAL NAVIGATION NAVBAR COMPONENT -->
        <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary border-opacity-25 pb-4 mb-5">
            <div class="container-fluid p-0">
                <!-- Brand Identity Header -->
                <a class="navbar-brand text-uppercase fw-light fs-4 text-start m-0 text-white" href="#" style="letter-spacing: 2px;">
                    Dangerous
                    <span class="d-block text-gold fs-6" style="font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 1px;">DANCE FLOOR</span>
                </a>

                <!-- Navbar Responsive Mobile Bar Trigger -->
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Navigation Route Links Wrapper -->
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <div class="navbar-nav align-items-center gap-2 gap-lg-3 my-3 my-lg-0" style="font-family: Arial, sans-serif; font-size: 14px;">
                        <a class="nav-link text-white" href="index.html">Home</a>
                        <a class="nav-link text-white" href="about.html">About Us</a>
                        <a class="nav-link text-white" href="founder.html">Founder</a>
                        <a class="nav-link text-white" href="instructor.html">Instructor</a>
                        <a class="nav-link text-white" href="register.html">Student Registration</a>
                        <a class="nav-link text-white" href="login.html">Founder Login</a>
                        <a class="nav-link text-white" href="attendance.html">Attendance</a>
                        <a class="nav-link text-white" href="fees.html">Fees Payment</a>
                        <a class="nav-link text-white" href="map.html">Map Location</a>
                        <a href="contact.html" class="btn btn-gold px-4 py-2 ms-lg-2">Contact</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- CENTERED REGISTRATION ENTRY SHEET -->
        <div class="d-flex justify-content-center align-items-center py-4">
            <div class="login-card p-4 p-sm-5 rounded-3 shadow-lg border-top border-4" style="border-top-color: gold !important;">

                <div class="text-center mb-4">
                    <h1 class="login-title h3 mb-2 fw-normal">Founder Login</h1>
                    <p class="subtitle mb-0 fw-light">Access management for student attendance & fees</p>
                </div>

                <!-- Input Component Form Fields -->
                <div class="mb-3">
                    <label for="username" class="form-label text-uppercase mb-2">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-uppercase mb-2">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
                </div>

                <button onclick="login()" class="btn btn-brand-brown w-100 text-uppercase fw-semibold mb-2">Sign In</button>

                <!-- Feedback Message Container -->
                <div id="message" class="text-center mt-3 mb-0"></div>
            </div>
        </div>

    </div>

    <!-- Script Execution Engine Logic -->
    <script>
        function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const messageElement = document.getElementById("message");

            // Successful authentication logic redirects directly to the dashboard module
            if (username === "founder" && password === "1234") {
                window.location.href = "dashboard.html";
            } else {
                // Dynamically applies clear Bootstrap alert danger typography classes
                messageElement.className = "text-danger fw-semibold";
                messageElement.innerHTML = "✕ Incorrect credential records. Please retry.";
            }
        }
    </script>

    <!-- Bootstrap 5 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
